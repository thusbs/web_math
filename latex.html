<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10243a" />
    <title>web_math | LaTeX 工具箱</title>
    <meta
        name="description"
        content="LaTeX 官网、编辑器、模板、公式速查、BibTeX 工具与 TikZ 作品库。"
    />
    <link rel="shortcut icon" href="./assets/images/favicon.png" />
    <link rel="stylesheet" href="./assets/fontawesome-5.15.4/css/all.min.css" />
    <link rel="stylesheet" href="./assets/css/math-academic.css" />
    <script>
        window.MathJax = {
            loader: { load: ["[tex]/begingroup"] },
            tex: {
                packages: { "[+]": ["begingroup"] },
                inlineMath: { "[+]": [["$", "$"]] }
            },
            startup: { typeset: false }
        };
    </script>
    <script defer id="mathjax-script" src="https://cdn.jsdelivr.net/npm/@mathjax@4/tex-chtml.js"></script>
</head>
<body class="site-body" data-page="latex">
    <div id="site-root"></div>
    <script type="module" src="./assets/js/site-core.js"></script>
</body>
</html>
